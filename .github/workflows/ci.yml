name: CI

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [develop]
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3001/api

  backend:
    name: Backend — validate, test & syntax
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/verifid_ci
      DIRECT_URL: postgresql://ci:ci@localhost:5432/verifid_ci
      JWT_SECRET: ci-test-secret-minimum-32-characters-long
      FRONTEND_URL: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npm run validate

      - name: Prisma generate
        run: npx prisma generate

      - name: Run tests
        run: npm test

      - name: Syntax check (controllers & services)
        run: |
          node --check src/index.js
          node --check src/controllers/authController.js
          node --check src/controllers/verifyController.js
          node --check src/services/mrzService.js
          node --check src/services/amlService.js
          node --check src/services/groqService.js
          node --check src/services/ocrService.js
          node --check src/services/pdfService.js

  ci-success:
    name: CI — all checks passed
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ needs.frontend.result }}" != "success" ] || [ "${{ needs.backend.result }}" != "success" ]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI checks passed."
